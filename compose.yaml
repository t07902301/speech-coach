name: speech-coach
services:
  backend:
    build: backend
    command: ["flask", "run", "--host=0.0.0.0"]
    volumes:
      - ./backend:/backend
    environment:
      - FLASK_ENV=development
      - FLASK_APP=app.py
    ports:
      - "5000:5000"
    env_file:
      - .env   
    depends_on:
      - nlp
    # networks:
    #   - shared_network
  frontend:
    build: frontend
    command: ["npm", "start"]
    volumes:
      - ./frontend:/frontend
      - node-modules:/frontend/node_modules
    environment:
      - NODE_ENV=development
    ports:
      - '3000:3000'
    depends_on:
      - backend
    # networks:
    #   - shared_network
  nlp:
    build: models/speech_assessment
    command: ["flask", "run", "--host=0.0.0.0", "--port=6000", "--debug"]
    environment:
      - FLASK_ENV=development
      - FLASK_APP=app.py
    ports:
      - "6000:6000"
    # networks:
    #   - shared_network
# networks:
#   shared_network:
#     driver: bridge
volumes:
  node-modules:

